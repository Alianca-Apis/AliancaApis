<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Apis | Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./assets/imgs/logo_bn.png">
    <script src="script.js"></script>
</head>

<style>
    body {
        background-image:
            linear-gradient(#f9f6ed7c, #e5e3d681),
            url('./assets/imgs/imagem2-home.png');

        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
    }
</style>

<body class="bodyCadastro">
    <header class="navbar">
        <div class="logo">
            <img src="./assets/imgs/logo-main.png" alt="Aliança Apis Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#">Sobre Nós</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>
        </nav>
        <button class="btn_principalMarrom" onclick="window.location.href = 'login.html'">Acesse agora</button>
    </header>

    <div class="loginContainer">
        <div class="cardLogin">
            <h2>Cadastro</h2>
            <div class="detalheLinhaLogin"></div>

            <div class="input-row">
                <div class="input-group">
                    <span for="ipt_nome">Nome:</span>
                    <input type="text" id="ipt_nome" placeholder="Ex: João">
                </div>

                <div class="input-group">
                    <span for="ipt_sobrenome">Sobrenome:</span>
                    <input type="text" id="ipt_sobrenome" placeholder="Ex: Silva">
                </div>
            </div>

            <div class="input-group">
                <span for="ipt_email">Email:</span>
                <input type="text" id="ipt_email" placeholder="seu@email.com">
            </div>

            <div class="input-group">
                <span for="ipt_cpf">CPF:</span>
                <input type="text" id="ipt_cpf" placeholder="12345678901">
            </div>

            <div class="input-group">
                <span for="ipt_senha">Senha:</span>
                <input type="password" id="ipt_senha" placeholder="********">
            </div>

            <div class="input-group">
                <span for="ipt_confirmacaoSenha">Confirme sua senha:</span>
                <input type="password" id="ipt_confirmacaoSenha" placeholder="********">
            </div>

            <div class="input-group">
                <span for="ipt_confirmacaoCodigo">Código de ativação:</span>
                <input type="text" id="ipt_confirmacaoCodigo" placeholder="Digite o código de sua empresa   ">
            </div>


            <button onclick="cadastrar()" class="btn_principalMarrom">Cadastrar</button>
            <a href="login.html" class="">Já tenho conta.</a>

            <div id="div_erro"></div>
        </div>
    </div>

    <div class="copyrightFooterInv">
        <div class="logoFooter">
            <img src="./assets/imgs/logo_bn.png">
        </div>

        <p>Copyright © 2010-2026 Aliança Apis All rights reserved.</p>
    </div>

</body>

</html>
